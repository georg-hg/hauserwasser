# render.yaml — Deployment-Konfiguration für Render.com
# Hauserwasser: Digitales Fangbuch für Fischer an der Krems

databases:
  - name: hauserwasser-db
    plan: free
    databaseName: hauserwasser
    user: hauserwasser_user
    region: frankfurt

services:
  # ── Backend API ─────────────────────────────────────────
  - type: web
    name: hauserwasser-api
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: cd server && npm install
    startCommand: cd server && npm run db:migrate && npm run db:seed && node src/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: hauserwasser-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: GOOGLE_MAPS_API_KEY
        value: AIzaSyCkV_EsHvBIrKGjBPYMrKr1ej7DHoHDIKg
      - key: CORS_ORIGIN
        value: https://hauserwasser-client.onrender.com

  # ── Frontend (Static Site) ──────────────────────────────
  - type: web
    name: hauserwasser-client
    runtime: static
    buildCommand: cd client && npm install && npm run build
    staticPublishPath: client/dist
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: hauserwasser-api.onrender.com
      - key: VITE_GOOGLE_MAPS_KEY
        value: AIzaSyCkV_EsHvBIrKGjBPYMrKr1ej7DHoHDIKg
